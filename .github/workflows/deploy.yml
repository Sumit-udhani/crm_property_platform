name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 Docker Login
      - name: Docker Login
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 🏷️ Generate unique image tag
      - name: Set Image Tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # ─────────────────────────────────────────
      # 🐳 CRM BACKEND
      # ─────────────────────────────────────────

      - name: Build CRM Image
        run: |
          docker build \
            --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/crm-property-platform:${{ env.TAG }} .

      - name: Push CRM Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/crm-property-platform:${{ env.TAG }}

      # ─────────────────────────────────────────
      # 🐳 ADMIN PANEL
      # ─────────────────────────────────────────

      - name: Build Admin Panel Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_HOST=${{ secrets.NEXT_PUBLIC_API_HOST }} \
            --build-arg NEXT_PUBLIC_BUY_URL=${{ secrets.NEXT_PUBLIC_BUY_URL }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/admin-panel:${{ env.TAG }} \
            ./frontend/saasable-ui/admin/nextjs

      - name: Push Admin Panel Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/admin-panel:${{ env.TAG }}

      # ─────────────────────────────────────────
      # 🔐 AWS + EKS Setup
      # ─────────────────────────────────────────

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name CRM

        # 🔐 Set Database Secret in Kubernetes  ← HERE (after EKS connect, before deploy)
      - name: Set Database Secret
        run: |
          kubectl create secret generic db-secret \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ─────────────────────────────────────────
      # 🚀 DEPLOY
      # ─────────────────────────────────────────

      - name: Deploy CRM
        run: |
          kubectl set image deployment/crm-property-platform \
            crm-property-platform=${{ secrets.DOCKERHUB_USERNAME }}/crm-property-platform:${{ env.TAG }}

      - name: Deploy Admin Panel
        run: |
          kubectl set image deployment/admin-panel \
            admin-panel=${{ secrets.DOCKERHUB_USERNAME }}/admin-panel:${{ env.TAG }}

      # ─────────────────────────────────────────
      # ✅ Rollout Status
      # ─────────────────────────────────────────

      - name: Rollout Status
        run: |
          kubectl rollout status deployment/crm-property-platform
          kubectl rollout status deployment/admin-panel
name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 Login to DockerHub
      - name: Docker Login
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

- name: Debug files
  run: ls -la
  
      # 🐳 Build Docker Image
      - name: Build Image
  run: |
    docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/crm-property-platform:latest .

      # 🚀 Push Image
      - name: Push Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/crm-property-platform:latest

      # ☸️ Setup Kubeconfig
      - name: Set Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # 🚀 Deploy to Kubernetes
      - name: Deploy
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
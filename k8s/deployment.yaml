apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-property-platform
  labels:
    app: crm-property-platform

spec:
  replicas: 3
  selector:
    matchLabels:
      app: crm-property-platform

  template:
    metadata:
      labels:
        app: crm-property-platform

    spec:
      containers:
        - name: crm-property-platform
          image: sumit244/crm-property-platform:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DATABASE_URL